<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>백운국 · BAEK WOON-KOOK</title>
<meta name="description" content="백운국(BAEK WOON-KOOK) 추상 회화 갤러리. 강렬한 색과 형태로 쌓아 올린 작업들." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css?v=20260603c" />
</head>
<body>

<header class="hero">
  <div class="bg" id="heroBg"></div>
  <div class="veil"></div>
  <div class="center">
    <h1>백운국</h1>
    <div class="en">BAEK WOON-KOOK · PAINTINGS</div>
    <p class="tag">강렬한 색과 형태로 쌓아 올린 추상 회화.<br>유물과 풍경, 선과 면이 교차하는 작업들.</p>
    <div class="cta">
      <a class="btn solid" href="works.html">작품 보기</a>
      <a class="btn ghost" href="about.html">작가 소개</a>
    </div>
  </div>
  <div class="scroll">SCROLL ↓</div>
</header>

<!-- 대표 작품 -->
<section id="featured">
  <div class="head reveal">
    <div class="k">Selected Works</div>
    <h2>대표 작품</h2>
    <p>캔버스 위에 유화와 아크릴로 작업한 회화들.</p>
  </div>
  <div class="works" id="featured-grid"></div>
  <div class="head"><a class="btn more" href="works.html">전체 작품 보기 →</a></div>
</section>

<!-- 전시 -->
<section class="alt" id="exhibition">
  <div class="head reveal">
    <div class="k">Exhibition</div>
    <h2>전시</h2>
    <p>전시장에 걸린 작품과 현장의 기록.</p>
  </div>
  <div class="exrow" id="exh-grid"></div>
  <div class="head"><a class="btn more" href="exhibitions.html">전시 더 보기 →</a></div>
</section>

<!-- 작가 소개 티저 -->
<section id="about-teaser">
  <div class="head reveal">
    <div class="k">Biography</div>
    <h2>작가 소개</h2>
    <p id="intro-text"></p>
    <a class="btn more" href="about.html">살아온 길 보기 →</a>
  </div>
</section>

<script src="assets/data.js?v=20260603c"></script>
<script src="assets/site.js?v=20260603c"></script>
<script>
  window.pageInit = function () {
    // 히어로 배경
    document.getElementById("heroBg").style.backgroundImage = "url('" + imgSrc(WORKS[0].file) + "')";
    // 대표 작품 6점
    renderWorks(document.getElementById("featured-grid"), WORKS.slice(0, 6));
    // 전시 3점 (라이트박스)
    const eg = document.getElementById("exh-grid");
    const exItems = EXH.slice(0, 3);
    exItems.forEach((e, i) => {
      const fig = document.createElement("figure"); fig.className = "reveal";
      const img = new Image(); img.src = imgSrc(e.file); img.alt = e.t; img.loading = "lazy";
      const cap = document.createElement("figcaption");
      cap.textContent = e.t + (e.year ? " · " + e.year : "");
      fig.appendChild(img); fig.appendChild(cap);
      fig.onclick = () => openLightbox(exItems.map(x => ({ file:x.file, t:x.t, m:x.year })), i);
      eg.appendChild(fig);
    });
    // 소개 문구
    document.getElementById("intro-text").textContent = SITE.intro;
  };
</script>
</body>
</html>
